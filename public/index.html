<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Online Voting Portal - Onboarding</title>
  <meta name="description" content="Cast your vote securely using cryptographically verified digital identity authentication.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Premium Header -->
  <header class="main-header">
    <div class="logo-container">
      <div class="logo-icon">🗳️</div>
      <div class="logo-text">VOTE SECURE</div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle light/dark theme">
        <span id="themeBtnText">☀️ Light Mode</span>
      </button>
    </div>
  </header>

  <!-- Main Auth Panel Wrapper -->
  <main class="auth-wrapper">
    <section class="auth-container">
      
      <div class="auth-header">
        <h1 class="auth-title" id="authFormTitle">Welcome Portal</h1>
        <p class="auth-subtitle" id="authFormSubtitle">Verify your identity to enter the secure portal.</p>
      </div>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignIn">Sign In</button>
        <button class="auth-tab" id="tabSignUp">Sign Up</button>
      </div>

      <!-- Dynamic Status/Error Banner -->
      <div class="status-banner" id="statusBanner" role="alert"></div>

      <!-- ONBOARDING FORM -->
      <form id="authForm" novalidate>
        
        <!-- Identity Field -->
        <div class="form-group">
          <label class="form-label" for="identityInput">User Name</label>
          <div class="input-wrapper">
            <span class="input-icon">🪪</span>
            <input 
              type="text" 
              id="identityInput" 
              class="form-input" 
              placeholder="Enter your User Name" 
              required 
              autocomplete="username"
            >
          </div>
          <div class="validation-message" id="identityValidationMsg" style="color: var(--error); font-size: 0.75rem; margin-top: 0.25rem; display: none;"></div>
          <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem;" id="identityHint">
            Enter your unique User Name
          </div>
        </div>

        <!-- Email Field (Only shown during Sign Up) -->
        <div class="form-group" id="emailFormGroup" style="display: none;">
          <label class="form-label" for="emailInput">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input 
              type="email" 
              id="emailInput" 
              class="form-input" 
              placeholder="you@example.com" 
              autocomplete="email"
              style="padding-left: 2.75rem;"
            >
          </div>
          <div class="validation-message" id="emailValidationMsg" style="color: var(--error); font-size: 0.75rem; margin-top: 0.25rem; display: none;"></div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="form-label" for="passwordInput">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input 
              type="password" 
              id="passwordInput" 
              class="form-input" 
              placeholder="••••••••" 
              required 
              autocomplete="current-password"
              style="padding-right: 3rem;"
            >
            <button type="button" class="password-toggle-btn" id="passwordToggleBtn" aria-label="Toggle password visibility">
              👁️
            </button>
          </div>
          <div class="validation-message" id="passwordValidationMsg" style="color: var(--error); font-size: 0.75rem; margin-top: 0.25rem; display: none;"></div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="btnSubmit">
          <span id="submitBtnText">Access Dashboard</span> ➔
        </button>

      </form>

    </section>
  </main>

  <!-- Modern Secure Footer -->
  <footer class="main-footer">
    <p>© 2026 Vote Secure. Cryptographically hardened user records. Standard data protocols active.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
